<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pro - Controle de Validades</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased p-4 sm:p-6 min-h-screen">

    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center bg-gray-800 p-5 rounded-2xl border border-gray-700 shadow-xl mb-6 gap-4">
        <div>
            <h1 class="text-2xl font-black text-blue-400 tracking-tight">Dashboard de Validades</h1>
            <p class="text-xs text-gray-400 mt-1">Dados consolidados em tempo real via Google Sheets (Apenas Validades Futuras)</p>
        </div>
        <div class="flex items-center space-x-3">
            <button onclick="limparTodosFiltros()" id="btnLimparFiltros" class="hidden px-3 py-2 bg-red-600/20 hover:bg-red-600 text-red-300 hover:text-white rounded-xl text-xs font-bold transition border border-red-500/30">
                ❌ Limpar Filtros Ativos
            </button>
            <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 rounded-xl text-xs font-bold text-white transition shadow-md">
                ⬅️ Abrir Coletor (Scanner)
            </button>
        </div>
    </div>

    <div id="loader" class="text-center py-20">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-t-blue-500 border-gray-700 mb-4"></div>
        <p class="text-gray-400 font-medium">Processando dados e montando inteligência de BI...</p>
    </div>

    <div id="conteudoDash" class="max-w-7xl mx-auto space-y-6 hidden">
        
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow flex flex-col justify-between">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Vencimento Mapeado R$</span>
                <span id="kpiTotalRs" class="text-xl font-black text-emerald-400 mt-2">R$ 0,00</span>
            </div>
            
            <div onclick="alternarFiltroCard('vencimento', '3meses')" id="card3Meses" class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow flex flex-col justify-between cursor-pointer hover:border-amber-500 transition-all duration-200">
                <div class="flex justify-between items-start">
                    <span class="text-[10px] font-bold text-amber-400 uppercase tracking-wider">Vence &le; 3 Meses</span>
                    <span id="dot3m" class="h-2 w-2 rounded-full bg-transparent"></span>
                </div>
                <span id="kpi3Meses" class="text-xl font-black text-amber-300 mt-2">R$ 0,00</span>
            </div>

            <div onclick="alternarFiltroCard('vencimento', '6meses')" id="card6Meses" class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow flex flex-col justify-between cursor-pointer hover:border-orange-500 transition-all duration-200">
                <div class="flex justify-between items-start">
                    <span class="text-[10px] font-bold text-orange-400 uppercase tracking-wider">Vence &le; 6 Meses</span>
                    <span id="dot6m" class="h-2 w-2 rounded-full bg-transparent"></span>
                </div>
                <span id="kpi6Meses" class="text-xl font-black text-orange-300 mt-2">R$ 0,00</span>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow flex flex-col justify-between">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Cód. Barras Uniq</span>
                <span id="kpiCodBarras" class="text-xl font-black text-blue-400 mt-2">0</span>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow flex flex-col justify-between">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Qtd Total Itens</span>
                <span id="kpiUnidades" class="text-xl font-black text-purple-400 mt-2">0</span>
            </div>

            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700 shadow flex flex-col justify-between">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Lojas Ativas</span>
                <span id="kpiLojas" class="text-xl font-black text-gray-200 mt-2">0</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div
