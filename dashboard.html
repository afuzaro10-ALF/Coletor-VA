<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Controle de Validades</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800">

    <div class="min-h-screen flex flex-col">
        <header class="bg-white shadow-sm border-b border-gray-200 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl">📊</span>
                <h1 class="text-xl font-bold text-blue-600">Painel de Controle de Validades</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="window.location.href='index.html'" class="px-4 py-2 bg-gray-500 hover:bg-gray-600 text-white font-medium rounded-lg text-sm transition shadow-sm">Voltar ao Coletor</button>
                <button onclick="carregarDados()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-sm transition shadow-sm flex items-center gap-1">🔄 Atualizar Dados</button>
            </div>
        </header>

        <main class="flex-1 p-6 max-w-7xl mx-auto w-full space-y-6">
            
            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                    <label for="filtroLoja" class="block text-sm font-semibold text-gray-600 mb-1">Filtrar por Loja</label>
                    <select id="filtroLoja" onchange="filtrarDados()" class="w-full sm:w-64 px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none font-medium">
                        <option value="Todos">Todas as Lojas</option>
                    </select>
                </div>
                <div id="txtAtualizado" class="text-xs text-gray-400 font-medium self-end sm:self-auto">Aguardando dados...</div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-emerald-500 flex flex-col justify-between">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total R$ Coletado</span>
                    <span id="cardTotalValor" class="text-2xl font-black text-emerald-600 mt-1">R$ 0,00</span>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-blue-500 flex flex-col justify-between">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Total de Itens (Tipos)</span>
                    <span id="cardTotalItens" class="text-2xl font-black text-gray-800 mt-1">0</span>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-amber-500 flex flex-col justify-between">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Quantidade Unidades</span>
                    <span id="cardTotalEstoque" class="text-2xl font-black text-gray-800 mt-1">0</span>
                </div>
                <div class="bg-white p-5 rounded-xl shadow-sm border-l-4 border-purple-500 flex flex-col justify-between">
                    <span class="text-xs font-bold text-gray-400 uppercase tracking-wider">Lojas Ativas</span>
                    <span id="cardLojasAtivas" class="text-2xl font-black text-gray-800 mt-1">0</span>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
