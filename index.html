<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coletor de Estoque</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; text-align: center; }
        .tela { display: none; } 
        .ativa { display: block; } 
        #reader { width: 100%; max-width: 500px; margin: 0 auto; }
        .btn { padding: 10px 20px; font-size: 16px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="containerLogin" class="tela">
        <h2>Identificação do Operador</h2>
        <p>Por favor, selecione a loja para continuar:</p>
        <select id="selectLoja">
            <option value="">Selecione...</option>
            <option value="Maricá">01 - MARICÁ L</option>
            <option value="Recreio">02 - RECREIO L</option>
            <option value="Ipanema">03 - IPANEMA L</option>
        </select>
        <br><br>
        <button class="btn" onclick="salvarLojaEEntrar()">Entrar no Sistema</button>
    </div>

    <div id="containerScanner" class="tela">
        <h2>Escaneie o Código de Barras</h2>
        <p>Posicione o código de barras na área de leitura</p>
        
        <div id="reader"></div> 
        
        <br>
        <button class="btn" onclick="voltarParaInicio()">Voltar ao Início</button>
    </div>

    <script>
        let html5QrCode;

        // Fluxo padrão de inicialização
        window.onload = function() {
            const lojaSalva = localStorage.getItem('lojaSelecionada');

            if (!lojaSalva) {
                mudarTela('containerLogin');
            } else {
                mudarTela('containerScanner');
                inicializarScanner();
            }
        };

        function mudarTela(idTela) {
            document.querySelectorAll('.tela').forEach(t => t.classList.remove('ativa'));
            document.getElementById(idTela).classList.add('ativa');
        }

        function salvarLojaEEntrar() {
            const loja = document.getElementById('selectLoja').value;
            if (!loja) {
                alert('Por favor, selecione uma loja!');
                return;
            }
            localStorage.setItem('lojaSelecionada', loja);
            mudarTela('containerScanner');
            inicializarScanner();
        }

        function inicializarScanner() {
            if (html5QrCode && html5QrCode.isScanning) return;

            html5QrCode = new Html5Qrcode("reader");
            
            // Configuração padrão de leitura rápida
            const config = { 
                fps: 15, 
                qrbox: { width: 250, height: 250 } 
            };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config,
                onScanSuccess
            ).catch(err => {
                console.error("Erro ao iniciar câmera: ", err);
            });
        }

        // Processamento imediato sem travas de tempo ou tamanho
        function onScanSuccess(decodedText, decodedResult) {
            const codigoLimpo = decodedText.trim();
            enviarCodigoAoSistema(codigoLimpo);
        }

        function enviarCodigoAoSistema(codigo) {
            alert("Código Lido: " + codigo + "\n
