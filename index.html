<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coletor de Validades Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800 p-4 sm:p-6 flex items-center justify-center min-h-screen">

    <div id="secaoLogin" class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden p-6 space-y-6">
        <div class="text-center">
            <span class="text-4xl">🔒</span>
            <h2 class="text-2xl font-black text-blue-600 mt-2">Acesso Restrito</h2>
            <p class="text-sm text-gray-400 mt-1">Identifique-se para utilizar o coletor</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Usuário</label>
                <input type="text" id="loginUsuario" placeholder="Digite seu usuário" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm font-medium">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Senha</label>
                <input type="password" id="loginSenha" placeholder="••••••••" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm font-medium">
            </div>
            <button onclick="autenticar()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition shadow-md mt-2">Entrar no Sistema</button>
        </div>
    </div>

    <div id="secaoColetor" class="w-full max-w-2xl bg-white rounded-2xl shadow-md border border-gray-200 overflow-hidden hidden">
        <div class="bg-blue-600 p-5 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">Coletor de Validades</h1>
                <p class="text-xs text-blue-100 mt-1">Mapeamento com busca de produto e custo financeiro</p>
            </div>
            <button onclick="window.location.href='dashboard.html'" class="px-3 py-1.5 bg-blue-700 hover:bg-blue-800 rounded-lg text-xs font-semibold transition">Ver Dashboard</button>
        </div>

        <div class="p-6 space-y-4">
            
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Loja</label>
                <select id="campoLoja" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                    <option value="Barra">Barra</option>
                    <option value="Barra Free">Barra Free</option>
                    <option value="Botafogo">Botafogo</option>
                    <option value="Caxias">Caxias</option>
                    <option value="Copacabana">Copacabana</option>
                    <option value="Ipanema">Ipanema</option>
                    <option value="Itaipu">Itaipu</option>
                    <option value="Jd Botanico">Jd Botanico</option>
                    <option value="Maricá">Maricá</option>
                    <option value="Niteroi">Niteroi</option>
                    <option value="Recreio">Recreio</option>
                    <option value="CD">CD</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Código de Barras (Bipe aqui)</label>
                <input type="text" id="campoCodigo" oninput="buscarProduto(this.value)" placeholder="Escaneie ou digite o código" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm font-mono font-bold text-blue-600">
            </div>

            <div class="p-4 bg-blue-50 rounded-xl border border-blue-200 space-y-3">
                <span class="text-xs font-bold text-blue-500 uppercase tracking-wider block">Dados do Cadastro Localizado</span>
                
                <div class="grid grid-cols-1 gap-3">
                    <div>
                        <label class="block text-xs text-gray-500">Item / Descrição</label>
                        <input type="text" id="txtItemEDescricao" readonly placeholder="Aguardando bip..." class="w-full bg-transparent border-b border-gray-300 py-1 font-semibold text-sm focus:outline-none text-gray-700">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-1">
                    <div>
                        <label class="block text-xs text-gray-500">Fornecedor / Fabricante</label>
                        <input type="text" id="txtFornecedor" readonly placeholder="Aguardando bip..." class="w-full bg-transparent border-b border-gray-300 py-1 font-semibold text-sm focus:outline-none text-gray-700">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">Família</label>
                        <input type="text" id="txtFamilia" readonly placeholder="..." class="w-full bg-transparent border-b border-gray-300 py-1 text-sm focus:outline-none text-gray-600">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-1">
                    <div>
                        <label class="block text-xs text-gray-500">Custo Unitário (R$)</label>
                        <input type="text" id="txtCusto" readonly placeholder="0,00" class="w-full bg-transparent border-b border-gray-300 py-1 font-bold text-sm focus:outline-none text-gray-700">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">Total Perda Estimada (R$)</label>
                        <input type="text" id="txtTotalFinanceiro" readonly placeholder="0,00" class="w-full bg-transparent border-b border-gray-300 py-1 font-black text-sm focus:outline-none text-emerald-600">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Quantidade</label>
                    <input type="number" id="campoQtd" value="1" min="1" oninput="calcularTotalFinanceiro()" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-60
