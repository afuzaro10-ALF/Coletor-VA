<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coletor de Validades Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800 p-4 sm:p-6 flex items-center justify-center min-h-screen">

    <div id="secaoLogin" class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden p-6 space-y-4">
        <div class="text-center">
            <span class="text-4xl">🔒</span>
            <h2 class="text-2xl font-black text-blue-600 mt-2">Acesso Restrito</h2>
            <p id="txtStatusLogin" class="text-sm text-gray-400 mt-1">Sincronizando credenciais da nuvem...</p>
        </div>
        
        <div class="space-y-3">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Selecione sua Loja</label>
                <select id="loginLoja" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm font-medium">
                    <option value="">Carregando lojas...</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Usuário</label>
                <input type="text" id="loginUsuario" placeholder="Digite seu usuário" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm font-medium">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Senha</label>
                <input type="password" id="loginSenha" placeholder="••••••••" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm font-medium">
            </div>
            <button id="btnEntrar" onclick="autenticar()" disabled class="w-full py-3 bg-gray-400 text-white font-bold rounded-xl transition shadow-md mt-2 cursor-not-allowed">Aguarde o Carregamento...</button>
        </div>
    </div>

    <div id="secaoColetor" class="w-full max-w-xl bg-white rounded-2xl shadow-md border border-gray-200 overflow-hidden hidden">
        <div class="bg-blue-600 p-4 text-white flex justify-between items-center">
            <div>
                <h1 class="text-lg font-bold tracking-tight">Coletor de Validades</h1>
                <p class="text-xs text-blue-100 mt-0.5">Sessão: <span id="txtLojaAtiva" class="font-bold underline"></span> | Op: <span id="txtOperadorAtivo" class="font-bold"></span></p>
            </div>
            <button onclick="window.location.href='dashboard.html'" class="px-3 py-1.5 bg-blue-700 hover:bg-blue-800 rounded-lg text-xs font-semibold transition">Ver Dashboard</button>
        </div>

        <div id="etapaScanner" class="p-5 space-y-4">
            <div class="text-center py-1">
                <p class="text-sm font-bold text-gray-500 uppercase tracking-wide">Passo 1: Bipe ou digite o produto</p>
            </div>

            <div>
                <div id="leitorCameraContainer" class="p-2 bg-black rounded-xl overflow-hidden relative border border-gray-700 shadow-inner">
                    <div id="reader" class="w-full"></div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Código de Barras Manual</label>
                <input type="text" id="campoCodigo" onkeydown="verificarEnterScanner(event)" oninput="verificarTamanhoScanner(this.value)" placeholder="Digite e pressione Enter ou aguarde o bip..." class="w-full px-3 py-2.5 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:outline-none text-base font-mono font-bold text-center text-blue-600 tracking-wider">
            </div>
        </div>

        <div id="etapaFormulario" class="p-5 space-y-4 hidden">
            <div class="flex justify-between items-center border-b border-gray-100 pb-2">
                <button onclick="voltarParaScanner()" class="text-sm font-bold text-blue-600 hover:text-blue-800 flex items-center space-x-1">
                    <span>⬅️ Voltar / Cancelar</span>
                </button>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wide">Passo 2: Detalhes da Perda</p>
            </div>

            <div class="bg-gray-100 px-4 py-2 rounded-xl flex justify-between items-center">
                <span class="text-xs font-semibold text-gray-5
