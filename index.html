<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coletor de Validades Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 font-sans antialiased text-gray-800 p-4 sm:p-6 flex items-center justify-center min-h-screen">

    <div id="secaoLogin" class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden p-6 space-y-6">
        <div class="text-center">
            <span class="text-4xl">🔒</span>
            <h2 class="text-2xl font-black text-blue-600 mt-2">Acesso Restrito</h2>
            <p class="text-sm text-gray-400 mt-1">Identifique-se para utilizar o coletor</p>
        </div>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Usuário</label>
                <input type="text" id="loginUsuario" placeholder="Digite seu usuário" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm font-medium">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Senha</label>
                <input type="password" id="loginSenha" placeholder="••••••••" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm font-medium">
            </div>
            <button onclick="autenticar()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition shadow-md mt-2">Entrar no Sistema</button>
        </div>
    </div>

    <div id="secaoColetor" class="w-full max-w-2xl bg-white rounded-2xl shadow-md border border-gray-200 overflow-hidden hidden">
        <div class="bg-blue-600 p-5 text-white flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold">Coletor de Validades</h1>
                <p class="text-xs text-blue-100 mt-1">Mapeamento com busca de produto e custo financeiro</p>
            </div>
            <button onclick="window.location.href='dashboard.html'" class="px-3 py-1.5 bg-blue-700 hover:bg-blue-800 rounded-lg text-xs font-semibold transition">Ver Dashboard</button>
        </div>

        <div class="p-6 space-y-4">
            
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Loja</label>
                <select id="campoLoja" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                    <option value="Barra">Barra</option>
                    <option value="Barra Free">Barra Free</option>
                    <option value="Botafogo">Botafogo</option>
                    <option value="Caxias">Caxias</option>
                    <option value="Copacabana">Copacabana</option>
                    <option value="Ipanema">Ipanema</option>
                    <option value="Itaipu">Itaipu</option>
                    <option value="Jd Botanico">Jd Botanico</option>
                    <option value="Maricá">Maricá</option>
                    <option value="Niteroi">Niteroi</option>
                    <option value="Recreio">Recreio</option>
                    <option value="CD">CD</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Scanner de Código de Barras Ativo</label>
                <div id="leitorCameraContainer" class="p-2 bg-black rounded-xl overflow-hidden relative border border-gray-700 shadow-inner">
                    <div id="reader" class="w-full"></div>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Código de Barras (Digitado ou Escaneado)</label>
                <input type="text" id="campoCodigo" onkeydown="verificarEnterScanner(event)" oninput="verificarTamanhoScanner(this.value)" placeholder="O scanner preencherá aqui automaticamente" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm font-mono font-bold text-blue-600">
            </div>

            <div id="cardCadastro" class="p-4 bg-blue-50 rounded-xl border border-blue-200 space-y-3 transition-colors duration-300">
                <span id="txtStatusCadastro" class="text-xs font-bold text-blue-500 uppercase tracking-wider block">Dados do Cadastro Localizado</span>
                
                <div class="grid grid-cols-1 gap-3">
                    <div>
                        <label class="block text-xs text-gray-500">Item / Descrição</label>
                        <input type="text" id="txtItemEDescricao" readonly placeholder="Aguardando bip..." class="w-full bg-transparent border-b border-gray-300 py-1 font-semibold text-sm focus:outline-none text-gray-700">
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-1">
                    <div>
                        <label class="block text-xs text-gray-500">Fornecedor / Fabricante</label>
                        <input type="text" id="txtFornecedor" readonly placeholder="Aguardando bip..." class="w-full bg-transparent border-b border-gray-300 py-1 font-semibold text-sm focus:outline-none text-gray-700">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">Família</label>
                        <input type="text" id="txtFamilia" readonly placeholder="..." class="w-full bg-transparent border-b border-gray-300 py-1 text-sm focus:outline-none text-gray-600">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 pt-1">
                    <div>
                        <label class="block text-xs text-gray-500">Custo Unitário (R$)</label>
                        <input type="text" id="txtCusto" readonly placeholder="0,00" class="w-full bg-transparent border-b border-gray-300 py-1 font-bold text-sm focus:outline-none text-gray-700">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">Total Perda Estimada (R$)</label>
                        <input type="text" id="txtTotalFinanceiro" readonly placeholder="0,00" class="w-full bg-transparent border-b border-gray-300 py-1 font-black text-sm focus:outline-none text-emerald-600">
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Quantidade</label>
                    <input type="number" id="campoQtd" value="1" min="1" oninput="calcularTotalFinanceiro()" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Data de Vencimento</label>
                    <input type="date" id="campoValidade" class="w-full px-3 py-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm">
                </div>
            </div>

            <div class="pt-2">
                <button id="btnSalvar" onclick="salvarColeta()" class="w-full py-3 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-xl transition shadow-md flex items-center justify-center space-x-2">
                    <span>💾 Salvar Coleta</span>
                </button>
            </div>

        </div>
    </div>

    <script>
        const CADASTRO_URL = "https://docs.google.com/spreadsheets/d/1G3UPUEKfT2LM3aJKS3KP4YHq0gX0kAdqiqEdqFQbLqI/gviz/tq?tqx=out:csv&sheet=Cadastro";
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz4npNC4Bhx3cGbiuhdozsSr2-aRslAMtXm736wN74axZSmQh4Q-IqEWJAw2Na8I8uO/exec";
        
        let baseProdutos = {};
        let usuarioLogado = "";
        let html5QrCodeScanner = null;
        let produtoEncontrado = false;
        let emPausaLeitura = false; // Evita bips repetidos seguidos no mesmo milissegundo

        function autenticar() {
            const usuario = document.getElementById("loginUsuario").value.trim();
            const senha = document.getElementById("loginSenha").value.trim();

            if (usuario === "admin" && senha === "123") {
                usuarioLogado = usuario;
                document.body.classList.remove("flex", "items-center", "justify-center", "min-h-screen");
                document.getElementById("secaoLogin").classList.add("hidden");
                document.getElementById("secaoColetor").classList.remove("hidden");
                
                inicializarBaseCadastro();
                ligarCameraAutomatica(); // Inicializa o scanner na hora
            } else {
                alert("Usuário ou senha incorretos!");
            }
        }

        function inicializarBaseCadastro() {
            fetch(CADASTRO_URL)
                .then(response => response.text())
                .then(text => {
                    const linhas = text.split(/\r?\n/);
                    if (linhas.length < 2) return;

                    const cabecalho = linhas[0].split(',').map(c => c.replace(/^"|"$/g, '').trim().toLowerCase());
                    const idxCod = cabecalho.indexOf('codigo');
                    const idxItem = cabecalho.indexOf('item');
                    const idxDesc = cabecalho.indexOf('descricao');
                    const idxForn = cabecalho.indexOf('fornecedor');
                    const idxLinha = cabecalho.indexOf('linha');
                    const idxFam = cabecalho.indexOf('familia');
                    const idxCusto = cabecalho.indexOf('custo');

                    for (let i = 1; i < linhas.length; i++) {
                        if (!linhas[i].trim()) continue;
                        const colunas = líneas[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/^"|"$/g, '').trim());
                        
                        const codigo = colunas[idxCod];
                        if (codigo) {
                            baseProdutos[codigo] = {
                                item: colunas[idxItem] || '',
                                descricao: colunas[idxDesc] || '',
                                fornecedor: colunas[idxForn] || '',
                                linha: colunas[idxLinha] || '',
                                familia: colunas[idxFam] || '',
                                custo: parseFloat(colunas[idxCusto].replace(',', '.')) || 0
                            };
                        }
                    }
                })
                .catch(err => console.error("Erro ao ler aba Cadastro:", err));
        }

        // --- INICIALIZAÇÃO AUTOMÁTICA DA CÂMERA ---
        function ligarCameraAutomatica() {
            html5QrCodeScanner = new Html5Qrcode("reader");
            
            const config = { 
                fps: 20, // Aumentado um pouco para leituras mais fluidas
                qrbox: (width, height) => {
                    return { width: width * 0.85, height: height * 0.45 }; // Formato de mira retangular
                },
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.EAN_13, 
                    Html5QrcodeSupportedFormats.EAN_8, 
                    Html5QrcodeSupportedFormats.CODE_128, 
                    Html5QrcodeSupportedFormats.QR_CODE 
                ]
            };

            html5QrCodeScanner.start(
                { facingMode: "environment" }, 
                config, 
                (decodedText) => {
                    // Se estiver no tempo de espera pós-bip, ignora novas leituras temporariamente
                    if (emPausaLeitura) return;

                    emPausaLeitura = true;
                    document.getElementById('campoCodigo').value = decodedText;
                    buscarProduto(decodedText);
                    
                    // Cria uma pequena pausa de 2 segundos para o operador ver as info e digitar qtd/validade antes do próximo bip
                    setTimeout(() => {
                        emPausaLeitura = false;
                    }, 2000);
                },
                (errorMessage) => {}
            ).catch(err => {
                console.error("Erro ao iniciar câmera automática:", err);
                alert("Erro ao abrir a câmera de forma automática. Garanta o acesso HTTPS e dê permissões no navegador.");
            });
        }

        function verificarEnterScanner(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                buscarProduto(event.target.value);
            }
        }

        function verificarTamanhoScanner(valor) {
            const codigoLimpo = valor.trim();
            if (codigoLimpo.length >= 13) {
                buscarProduto(codigoLimpo);
            }
        }

        function buscarProduto(codigo) {
            codigo = codigo.trim();
            
            if (!codigo) {
                resetarCamposCadastro();
                return;
            }

            const prod = baseProdutos[codigo];
            const card = document.getElementById('cardCadastro');
            const statusTxt = document.getElementById('txtStatusCadastro');

            if (prod) {
                produtoEncontrado = true;
                
                card.className = "p-4 bg-blue-50 rounded-xl border border-blue-200 space-y-3";
                statusTxt.innerText = "Dados do Cadastro Localizado";
                statusTxt.className = "text-xs font-bold text-blue-500 uppercase tracking-wider block";

                document.getElementById('txtItemEDescricao').value = prod.item + (prod.descricao ? " - " + prod.descricao : "");
                document.getElementById('txtFornecedor').value = prod.fornecedor + (prod.linha ? " - " + prod.linha : "");
                document.getElementById('txtFamilia').value = prod.familia;
                document.getElementById('txtCusto').value = prod.custo.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                
                document.getElementById('txtItemEDescricao').dataset.itemBruto = prod.item;
                document.getElementById('txtItemEDescricao').dataset.descricaoBruta = prod.descricao;
                document.getElementById('txtItemEDescricao').dataset.fornecedorReal = prod.fornecedor;
                document.getElementById('txtItemEDescricao').dataset.linhaReal = prod.linha;
                
                calcularTotalFinanceiro();
            } else {
                produtoEncontrado = false;
                
                card.className = "p-4 bg-red-50 rounded-xl border border-red-200 space-y-3";
                statusTxt.innerText = "⚠️ ATENÇÃO: Produto não encontrado no cadastro!";
                statusTxt.className = "text-xs font-bold text-red-600 uppercase tracking-wider block";

                document.getElementById('txtItemEDescricao').value = "PRODUTO NÃO CADASTRADO";
                document.getElementById('txtFornecedor').value = "-";
                document.getElementById('txtFamilia').value = "-";
                document.getElementById('txtCusto').value = "0,00";
                document.getElementById('txtTotalFinanceiro').value = "0,00";
                
                document.getElementById('txtItemEDescricao').dataset.itemBruto = '';
                document.getElementById('txtItemEDescricao').dataset.descricaoBruta = '';
                document.getElementById('txtItemEDescricao').dataset.fornecedorReal = '';
                document.getElementById('txtItemEDescricao').dataset.linhaReal = '';
            }
        }

        function resetarCamposCadastro() {
            produtoEncontrado = false;
            const card = document.getElementById('cardCadastro');
            const statusTxt = document.getElementById('txtStatusCadastro');
            
            card.className = "p-4 bg-blue-50 rounded-xl border border-blue-200 space-y-3";
            statusTxt.innerText = "Dados do Cadastro Localizado";
            statusTxt.className = "text-xs font-bold text-blue-500 uppercase tracking-wider block";

            document.getElementById('txtItemEDescricao').value = '';
            document.getElementById('txtFornecedor').value = '';
            document.getElementById('txtFamilia').value = '';
            document.getElementById('txtCusto').value = '';
            document.getElementById('txtTotalFinanceiro').value = '';
        }

        function calcularTotalFinanceiro() {
            const custoTexto = document.getElementById('txtCusto').value;
            const qtd = parseInt(document.getElementById('campoQtd').value) || 0;

            if (custoTexto && produtoEncontrado) {
                const custoNum = parseFloat(custoTexto.replace('.', '').replace(',', '.'));
                const total = custoNum * qtd;
                document.getElementById('txtTotalFinanceiro').value = total.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
            }
        }

        function salvarColeta() {
            const btn = document.getElementById('btnSalvar');
            const loja = document.getElementById('campoLoja').value;
            const codigo = document.getElementById('campoCodigo').value.trim();
            const validadeInput = document.getElementById('campoValidade').value;
            const quantidade = parseInt(document.getElementById('campoQtd').value) || 0;

            if (!codigo) {
                alert("Por favor, insira ou bipe um código de barras.");
                return;
            }
            if (quantidade <= 0) {
                alert("Insira uma quantidade válida.");
                return;
            }
            if (!validadeInput) {
                alert("Selecione a data de validade.");
                return;
            }

            const [ano, mes, dia] = validadeInput.split('-');
            const dataValidadeFormatada = `${dia}/${mes}/${ano}`;

            let payload = {
                loja: loja,
                usuario: usuarioLogado,
                codigoBarras: codigo,
                validade: dataValidadeFormatada,
                quantidade: quantidade
            };

            if (produtoEncontrado) {
                payload.item = document.getElementById('txtItemEDescricao').dataset.itemBruto || '';
                payload.descricao = document.getElementById('txtItemEDescricao').dataset.descricaoBruta || '';
                payload.fornecedor = document.getElementById('txtItemEDescricao').dataset.fornecedorReal || '';
                payload.linha = document.getElementById('txtItemEDescricao').dataset.linhaReal || '';
                payload.familia = document.getElementById('txtFamilia').value;
                payload.totalPerda = document.getElementById('txtTotalFinanceiro').value;
            } else {
                payload.item = "NÃO CADASTRADO";
                payload.descricao = "";
                payload.fornecedor = "";
                payload.linha = "";
                payload.familia = "";
                payload.totalPerda = "0,00";
            }

            const params = new URLSearchParams(payload);

            btn.disabled = true;
            btn.innerText = "⏳ Gravando na Planilha...";

            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded"
                },
                body: params.toString()
            })
            .then(() => {
                alert(produtoEncontrado 
                    ? `✅ Coleta concluída com sucesso!\nItem: ${payload.item}` 
                    : `⚠️ Registrado apenas dados básicos (Código: ${codigo}) pois o produto não está cadastrado.`
                );
                resetarFormulario();
            })
            .catch(err => {
                console.error(err);
                alert("❌ Erro de conexão.");
            })
            .finally(() => {
                btn.disabled = false;
                btn.innerText = "💾 Salvar Coleta";
            });
        }

        function resetarFormulario() {
            document.getElementById('campoCodigo').value = '';
            document.getElementById('campoQtd').value = '1';
            document.getElementById('campoValidade').value = '';
            buscarProduto('');
            // Força a liberação da trava de bips para a próxima leitura
            emPausaLeitura = false;
        }
    </script>
</body>
</html>
